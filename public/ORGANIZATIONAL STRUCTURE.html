<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organizational Structure</title>
<style>
  :root{
    --bg-top:#0b1120;
    --bg-bot:#050810;
    --box-a:#1c2b4a;
    --box-b:#2f5aa8;
    --stroke:#4d8fe0;
    --glow:#38bdf8;
    --line:#3a5a86;
    --text:#eaf2ff;
    --title:#8fc4ff;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    min-height:100vh;
    font-family:'Segoe UI', Arial, Helvetica, sans-serif;
    background: radial-gradient(ellipse at 50% -10%, #142443 0%, var(--bg-top) 45%, var(--bg-bot) 100%);
    padding:36px 12px 60px;
  }
  h1{
    text-align:center;
    color:var(--title);
    font-size:1.6rem;
    letter-spacing:0.5px;
    margin:0 0 8px;
    text-shadow:0 0 18px rgba(56,189,248,0.35);
  }
  .subtitle{
    text-align:center;
    color:#7d93b8;
    font-size:0.85rem;
    margin:0 0 30px;
  }
  .chart-wrap{
    max-width:920px;
    margin:0 auto;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
  }
  .chart-wrap svg{
    display:block;
    width:100%;
    min-width:680px;
    height:auto;
  }

  /* ---- box styling ---- */
  .box rect{
    fill:url(#boxGrad);
    stroke:var(--stroke);
    stroke-width:1.2;
    filter:drop-shadow(0 0 0 rgba(56,189,248,0));
    transition:filter 0.25s ease, stroke 0.25s ease;
  }
  .box text{
    fill:var(--text);
    font-size:13px;
    font-weight:600;
    text-anchor:middle;
    pointer-events:none;
  }
  .box{
    cursor:default;
    opacity:0;
    transform-origin:center;
    animation:boxIn 0.55s ease forwards;
  }
  .box:hover rect{
    stroke:var(--glow);
    filter:drop-shadow(0 0 10px rgba(56,189,248,0.85));
  }

  @keyframes boxIn{
    from{ opacity:0; transform:translateY(10px) scale(0.96); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }

  /* ---- connector styling ---- */
  .conn{
    fill:none;
    stroke:var(--line);
    stroke-width:1.6;
    stroke-linecap:round;
    opacity:0;
    animation:drawLine 0.5s linear forwards, glowFade 2.2s ease-in-out 0.6s infinite alternate;
  }
  @keyframes drawLine{
    0%{ opacity:0; stroke-dashoffset:100; }
    1%{ opacity:1; }
    100%{ opacity:1; stroke-dashoffset:0; }
  }
  @keyframes glowFade{
    from{ stroke:var(--line); }
    to{ stroke:#5b8fd4; }
  }

  /* gentle ambient pulse on the whole chart after load */
  @keyframes ambientPulse{
    0%,100%{ filter:drop-shadow(0 0 0 rgba(56,189,248,0)); }
    50%{ filter:drop-shadow(0 0 6px rgba(56,189,248,0.18)); }
  }
  svg{
    animation:ambientPulse 6s ease-in-out 3s infinite;
  }
</style>
</head>
<body>
